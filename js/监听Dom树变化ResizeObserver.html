<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>监控元素大小变化</title>
    <style>
      .box {
        width: 100%;
        height: 100px;
        border: 1px solid red;
      }
    </style>
  </head>
  <body>
    <div id="box" class="box" style="width: 100%"></div>
    <div id="resizable" class="box"></div>
    <script>
      window.onload = function () {
        var targetNode = document.getElementById('box')
        console.log(targetNode)

        // 配置观察选项：
        var config = {
          attributes: true, // 布尔值，设置是否监视属性的变动
          childList: true, // 布尔值，设置是否监视直接子节点的变动
          subtree: true // 布尔值，设置是否监视所有后代节点的变动，默认为false
        }

        // 当观察到变动时执行的回调函数：
        var callback = function (mutationsList, observer) {
          for (var mutation of mutationsList) {
            if (mutation.type === 'childList') {
              console.log('A child node has been added or removed.')
            } else if (mutation.type === 'attributes') {
              console.log(
                'The ' + mutation.attributeName + ' attribute was modified.'
              )
            }
          }
        }

        // 创建一个观察器实例并传入回调函数
        var observer = new MutationObserver(callback)

        // 开始观察目标节点
        observer.observe(targetNode, config)

        // 之后，可停止观察
        // observer.disconnect()

        // ======= ResizeObserver

        // var resizeObserver = new ResizeObserver((entries) => {
        //   console.log('entries:')
        //   console.log(entries)
        //   for (let entry of entries) {
        //     console.log('Element:', entry.target)
        //     console.log('New size:', entry.contentRect)
        //     console.log(entry.contentRect.width, 'x:', entry.contentRect.height)
        //   }
        // })

        // // 观察目标元素
        // resizeObserver.observe(document.getElementById('resizable'))
      }
    </script>
  </body>
</html>
