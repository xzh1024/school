<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手写递归-深拷贝</title>
  </head>
  <body>
    <script>
      /**
       * 深拷贝
       * @param obj obj
       * @param map weakmap 为了避免循环引用
       */
      function deepClone(obj, map = new WeakMap()) {
        if (typeof obj !== 'object' || obj == null) return obj

        // 避免循环引用
        const objFromMap = map.get(obj)
        if (objFromMap) return objFromMap

        let target = {}
        map.set(obj, target)

        // Map
        if (obj instanceof Map) {
          target = new Map()
          obj.forEach((v, k) => {
            const v1 = deepClone(v, map)
            const k1 = deepClone(k, map)
            target.set(k1, v1)
          })
        }

        // Set
        if (obj instanceof Set) {
          target = new Set()
          obj.forEach((v) => {
            const v1 = deepClone(v, map)
            target.add(v1)
          })
        }

        // Array
        if (obj instanceof Array) {
          target = obj.map((item) => deepClone(item, map))
        }

        // Object
        for (const key in obj) {
          const val = obj[key]
          const val1 = deepClone(val, map)
          target[key] = val1
        }

        return target
      }

      const target = {
        name: 'zekeyang',
        age: 29,
        friend: {
          name: 'rookie',
          age: 27
        },
        nullKey: null,
        undefinedKey: undefined,
        date: new Date(),
        sayHi() {
          console.log('Hi!' + this.name + '!')
        },
        symbol: Symbol('zekeyang'),
        hobbies: ['coding', 'walking', 'singing'],
        setKey: new Set([1, 2, 3]),
        mapKey: new Map([
          ['x', 1],
          ['y', 2]
        ])
      }
      target.friend.friend = target

      var data1 = target
      var data2 = deepClone(target)
      console.log('data--1')
      console.log(data1)
      console.log(data1 === target)
      console.log('data--2')
      console.log(data2)
      console.log(data2 === target)
    </script>
  </body>
</html>
